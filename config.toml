title = "Structured, FAIR knowledge bricks"
description = "A nanopublication is a small, structured unit of scientific knowledge — a claim, a dataset description, a replication result — that is machine-readable, citable, and permanently linked to its author via ORCID. Think of them as building blocks for open science."
